<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #00354b;
            --primary-dark: #00354b;
            --btn-save-color: #007ca5;
            --border-light: #e2e8f0;
            --text-dark: #1a1a1a;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
        }
        .navbar {
            padding: 1rem 2rem;
            background-color: #ffffff !important;
            border-bottom: 1px solid #f0f0f0;
        }
        .navbar-brand {
            color: #043948;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
        }
        .navbar-brand:hover {
            color: #043948;
        }
        .nav-link {
            color: #333333;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
        }
        .search-wrapper {
            position: relative;
            width: 220px;
        }
        .search-wrapper .form-control {
            border-radius: 50px;
            padding-left: 2.2rem;
            font-size: 0.9rem;
            border: 1px solid #ced4da;
            height: 40px;
        }
        .search-wrapper .fa-search {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #ced4da;
            background-color: white;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .icon-btn:hover {
            background-color: #f8f9fa;
        }
        .icon-btn.Profile-active {
            background-color: #00354b;
            color: white;
            border-color: #00354b;
        }
        .tab-container {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
            align-items: center;
        }
        /* Base layout for all tab buttons */
        .tab-btn {
            width: 160px;
            height: 44px;
            border-radius: 6px;
            font-weight: 500;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        /* Active Tab Styling */
        .tab-btn.active-tab {
            background-color: #00354b;
            color: white;
            border: none;
        }
        /* Inactive Tab Styling */
        .tab-btn.inactive-tab {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            color: #333333;
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.05);
        }
        .tab-btn.inactive-tab:hover {
            background-color: #f8f9fa;
            color: #333333;
        }
        /* Fixed Add Address Button Layout */
        .btn-address {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: #ffffff !important;
            background-color: var(--btn-save-color);
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            transition: opacity 0.2s;
            height: 44px;
        }
        .btn-address:hover {
            opacity: 0.9;
            color: #ffffff;
        }
        .address-card {
            max-width: 360px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.02);
        }
        .address-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 0;
        }
        .badge-tag {
            background-color: var(--primary-dark);
            color: #ffffff;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .name-label {
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 12px;
            margin-bottom: 4px;
        }
        .address-text {
            font-size: 0.85rem;
            color: #666666;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .phone-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>

    <div class="container-fluid px-5">
        <div class="mx-2 py-4">
            <h1 class="mb-1" style="font-weight: 700; font-size: 2.2rem;">Profile</h1>
            <nav aria-label="breadcrumb" class="mb-4">
                <span class="text-muted" style="font-size: 0.9rem;">Home &gt; Address</span>

            <div class="address-card">
