<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragranzia - Add Address</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #00354b;
            --primary-dark: #00354b;
            --btn-save-color: #007ca5;
            --border-light: #e2e8f0;
            --text-dark: #1a1a1a;
            --input-border: #ced4da;
            --badge-bg: #e9ecef;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }
        .navbar {
            padding: 1rem 2rem;
            background-color: #ffffff !important;
            border-bottom: 1px solid #f0f0f0;
        }
        .navbar-brand {
            color: #043948;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
        }
        .nav-link {
            color: #333333;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
        }
        .search-wrapper {
            position: relative;
            width: 220px;
        }
        .search-wrapper .form-control {
            border-radius: 50px;
            padding-left: 2.2rem;
            font-size: 0.9rem;
            border: 1px solid #ced4da;
            height: 40px;
        }
        .search-wrapper .fa-search {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #ced4da;
            background-color: white;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icon-btn.Profile-active {
            background-color: #00354b;
            color: white;
            border-color: #00354b;
        }
        .tab-container {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
            align-items: center;
        }
        .profile-btn {
            width: 160px;
            height: 44px;
            border-radius: 6px;
            border: none;
            background-color: #00354b;
            color: white;
            font-weight: 500;
        }
        .other-btn {
            width: 160px;
            height: 44px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            color: #333333;
            font-weight: 500;
        }
        .btn-address {
            border: none;
            color: #ffffff;
            background-color: var(--btn-save-color);
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 6px;
        }
        .address-card {
            max-width: 360px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px;
            background-color: #ffffff;
            opacity: 0.4; 
            filter: blur(1px);
        }
        .address-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 0;
        }
        .badge-tag {
            background-color: var(--primary-dark);
            color: #ffffff;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .address-text {
            font-size: 0.85rem;
            color: #666666;
            line-height: 1.5;
        }

        /* --- Custom Modal Overlay Styles --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1050;
        }
        .custom-modal {
            background-color: #ffffff;
            width: 100%;
            max-width: 820px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            padding: 32px;
        }
        .modal-section-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 14px;
        }
        .type-radio-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .type-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            background-color: var(--badge-bg);
            color: #1a1a1a;
            transition: all 0.2s;
        }
        .type-input {
            display: none;
        }
        .type-input:checked + .type-label.home-active {
            background-color: var(--primary-dark);
            color: #ffffff;
        }
        .form-label-custom {
            font-size: 0.85rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 8px;
        }
        .form-control-custom {
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.85rem;
            width: 100%;
            color: #333333;
        }
        .form-control-custom::placeholder {
            color: #a0aec0;
        }
        .form-control-custom:focus {
            outline: none;
            border-color: var(--btn-save-color);
        }
        .textarea-custom {
            resize: none;
            height: 80px;
        }
        .btn-modal-save {
            background-color: var(--btn-save-color);
            color: #ffffff;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 42px;
            border: none;
            border-radius: 6px;
            float: right;
            margin-top: 10px;
        }
        .icon-btn a {
            color: inherit;        
            text-decoration: none;  
            display: flex;          
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        footer a {
            color: #043948 !important;   
            text-decoration: none;       
            transition: color 0.2s ease;
        }
        footer a:hover {
            color: #ffffff !important;   
            text-decoration: underline;  
        }
        footer .list-unstyled li {
            color: #043948;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light shadow-sm">
        <div class="container-fluid px-0">
            <a class="navbar-brand" href="#">Fragranzia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                <ul class="navbar-nav align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="Product Page.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Gifting</a></li>
                    <li class="nav-item me-3"><a class="nav-link" href="About.html">About</a></li>
                    <li class="nav-item me-2">
                        <div class="search-wrapper">
                            <i class="fa-solid fa-magnifying-glass fa-search"></i>
                            <input class="form-control" type="search" placeholder="Search Here" aria-label="Search">
                        </div>
                    </li>
                    <li class="nav-item">
                        <button class="icon-btn" aria-label="Cart">
                            <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="icon-btn" aria-label="Notifications">
                            <i class="fa-regular fa-bell"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="icon-btn Profile-active" aria-label="Profile">
                            <a href="Profile 1.html"><i class="fa-regular fa-user"></i></a>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5" style="filter: blur(1px); opacity: 0.4;">
        <div class="mx-2 py-4">
            <h1 class="mb-1" style="font-weight: 700; font-size: 2.2rem;">Profile</h1>
            <nav aria-label="breadcrumb" class="mb-4">
                <span class="text-muted" style="font-size: 0.9rem;">Home &gt; Address</span>
            </nav>

            <div class="tab-container">
                <button class="other-btn" type="button">Profile</button>
                <button class="profile-btn" type="button">Address</button>
                <button class="other-btn" type="button">My Orders</button>
                <div class="ms-auto">
                    <a href="Adress view.html" style="text-decoration: none;">
                        <button class="btn-address" type="button">Add Address</button>
                    </a>
                </div>
            </div>

            <div class="address-card">
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="address-title">Address 2</h2>
                    <span class="badge-tag"><i class="fa-solid fa-building"></i> Office</span>
                </div>
                <div class="fw-bold my-2" style="font-size:0.85rem">Priyesh Manu</div>
                <p class="address-text">Helpstir Technologies 3rd Floor, Lulu Cyber Tower Infopark Phase 2 Kakkanad, Kochi - 682042</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay">
        <div class="custom-modal">
            <form>
                <div class="modal-section-title">Address Type</div>
                <div class="type-radio-group">
                    <div>
                        <input type="radio" name="addressType" id="typeHome" class="type-input" checked>
                        <label for="typeHome" class="type-label home-active">
                            <i class="fa-house-chimney fa-solid"></i> Home
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="addressType" id="typeOffice" class="type-input">
                        <label for="typeOffice" class="type-label">
                            <i class="fa-solid fa-building"></i> Office
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="addressType" id="typeOther" class="type-input">
                        <label for="typeOther" class="type-label">
                            <i class="fa-solid fa-address-book"></i> Other
                        </label>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label-custom">Full Name</label>
                        <input type="text" class="form-control-custom" placeholder="Enter full name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Phone Number</label>
                        <input type="tel" class="form-control-custom" placeholder="Enter 10-digit mobile number">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label-custom">Address</label>
                    <textarea class="form-control-custom textarea-custom" placeholder="Enter house or building details"></textarea>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label-custom">City/District</label>
                        <input type="text" class="form-control-custom" placeholder="Enter City/District">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">State</label>
                        <input type="text" class="form-control-custom" placeholder="Enter state">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">Land Mark</label>
                        <input type="text" class="form-control-custom" placeholder="Enter state">
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label-custom">PinCode</label>
                        <input type="text" class="form-control-custom" placeholder="Enter state">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">Alternative Phone number(Optional)</label>
                        <input type="tel" class="form-control-custom" placeholder="Enter state">
                    </div>
                    <div class="col-md-4"></div>
                </div>

                <div class="clearfix">
                   <a href="15editaddress.html"><button type="submit" class="btn-modal-save">Save</button></a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
