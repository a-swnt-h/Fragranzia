<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragranzia - Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #063928;
            --btn-dark-color: #00354b;
            --btn-save-color: #007ca5;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
        }
        .navbar {
            padding: 1rem 2rem;
            background-color: #ffffff !important;
            border-bottom: 1px solid #f0f0f0;
        }
        .navbar-brand {
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
        }
        .navbar-brand:hover {
            color: var(--primary-color);
        }
        .nav-link {
            color: #333333;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
        }
        .search-wrapper {
            position: relative;
            width: 220px;
        }
        .search-wrapper .form-control {
            border-radius: 50px;
            padding-left: 2.2rem;
            font-size: 0.9rem;
            border: 1px solid #ced4da;
            height: 40px;
        }
        .search-wrapper .fa-search {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #ced4da;
            background-color: white;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .icon-btn:hover {
            background-color: #f8f9fa;
            color: #333;
        }
        .icon-btn.Profile-active {
            background-color: #043948;
            color: white;
            border-color: #043948;
        }
        
        /* Navigation Tabs Styling */
        .tab-container {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
        }
        .tab-btn {
            width: 160px;
            height: 44px;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none; /* Removes text underline */
            display: inline-flex;  /* Centers text inside link */
            justify-content: center;
            align-items: center;
        }
        .profile-btn {
            border: none;
            background-color: #00354b;
            color: #ffffff;
        }
        .profile-btn:hover {
            color: #ffffff;
        }
        .other-btn {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            color: #333333;
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.05);
            transition: background-color 0.2s, color 0.2s;
        }
        .other-btn:hover {
            background-color: #f8f9fa;
            color: #333333; /* Prevents default blue link color on hover */
        }

        /* Form Styling */
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #000000;
            margin-bottom: 8px;
        }
        .custom-input-group {
            position: relative;
        }
        .custom-control {
            width: 100%;
            background-color: #ffffff;
            border: 1px solid #b0b8c1;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #333333;
            height: 44px;
        }
        .custom-control:focus {
            outline: none;
            border-color: var(--btn-save-color);
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #333333;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Save Button */
        .btn-save {
            border: none;
            color: #ffffff;
            background-color: var(--btn-save-color);
            font-weight: 600;
            padding: 10px 40px;
            border-radius: 6px;
            float: right;
            margin-top: 15px;
            transition: opacity 0.2s;
        }
        .btn-save:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light shadow-sm">
        <div class="container-fluid px-0">
            <a class="navbar-brand" href="#">Fragranzia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                <ul class="navbar-nav align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link active" href="3main.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="4products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Gifting</a></li>
                    <li class="nav-item me-3"><a class="nav-link" href="10about.html">About</a></li>
                    <li class="nav-item me-2">
                        <div class="search-wrapper">
                            <i class="fa-solid fa-magnifying-glass fa-search"></i>
                            <input class="form-control" type="search" placeholder="Search Here" aria-label="Search">
                        </div>
                    </li>
                    <li class="nav-item"><a href="9cart.html" class="icon-btn" aria-label="Cart"><i class="fa-solid fa-cart-shopping"></i></a></li>
                    <li class="nav-item"><button class="icon-btn" aria-label="Notifications"><i class="fa-regular fa-bell"></i></button></li>
                    <li class="nav-item"><a href="12profileedit.html" class="icon-btn Profile-active" aria-label="Profile"><i class="fa-regular fa-user"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container-fluid px-5">
        <div class="mx-2 py-3">
            <!-- Header section -->
            <h1 class="mb-1" style="font-weight: 700; font-size: 2.2rem;">Profile</h1>
            <nav aria-label="breadcrumb" class="mb-4">
                <span class="text-muted" style="font-size: 0.9rem;">Home &gt; Profile</span>
            </nav>

            <div class="tab-container">
                <a href="11profile.html" class="tab-btn profile-btn">Profile</a>
                <a href="13address.html" class="tab-btn other-btn">Address</a>
                <a href="adress my order.html" class="tab-btn other-btn">My Orders</a>
            </div>

            <!-- Profile Info Form Grid -->
            <form class="row g-4">
                <!-- Row 1 -->
                <div class="col-12 col-md-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="custom-control" value="Thomas">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" class="custom-control" value="thomas12@gmail.com">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="custom-control" value="+91 98765 43210">
                </div>

                <!-- Row 2 -->
                <div class="col-12 col-md-4">
                    <label class="form-label">Date of Birth</label>
                    <input type="text" class="custom-control" value="01/01/1995">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Gender</label>
                    <input type="text" class="custom-control" value="Male">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label">Password</label>
                    <div class="custom-input-group">
                        <input type="password" class="custom-control" value="password123" style="letter-spacing: 3px;">
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <!-- Action Button Row -->
                <div class="col-12 text-end">
                    <button type="submit" class="btn-save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
